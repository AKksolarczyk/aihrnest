security:
    password_hashers:
        App\Workspace\Domain\Model\User: 'auto'

    providers:
        app_users:
            entity:
                class: App\Workspace\Domain\Model\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_users
            user_checker: App\Security\ActiveUserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                enable_csrf: true
            logout:
                path: _security_logout
                target: app_login

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/register/confirm, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Workspace\Domain\Model\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
