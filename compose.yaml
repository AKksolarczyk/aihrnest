services:
  traefik:
    image: traefik:v3.1
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app
    command: sh -lc "composer install && php -S 0.0.0.0:8000 -t public"
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: local-dev-secret
      DEFAULT_URI: http://smartdesk.localhost
    volumes:
      - ./:/app
      - composer_cache:/tmp/composer-cache
    labels:
      traefik.enable: "true"
      traefik.http.routers.smartdesk.rule: Host(`smartdesk.localhost`)
      traefik.http.routers.smartdesk.entrypoints: web
      traefik.http.services.smartdesk.loadbalancer.server.port: "8000"
    depends_on:
      - traefik

volumes:
  composer_cache:
