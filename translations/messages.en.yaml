about:
  meta_title: 'About Smart Desk'
  eyebrow: 'Smart Desk & Rooms Scheduler'
  hero:
    title: 'Desks, rooms and absences in one app.'
    lead: 'Smart Desk organizes office planning end-to-end. A user creates an account, activates it by email, books a desk from the map, joins the waitlist, receives an offer when a desk is released, plans recurring attendance, reports issues and uses people finder and admin reporting.'
    login: 'Go to sign in'
    register: 'Create account'
    dashboard: 'Open dashboard'
  pill:
    booking_title: 'Desk Booking'
    booking: 'Desk booking and manual desk release for a specific day with an office map view.'
    waitlist_title: 'Waitlist + Recurrence'
    waitlist: 'Queue for occupied desks with email offer after release, plus recurring reservation rules.'
    people_title: 'People Finder'
    people: 'Quick view of people in the office with location, desk status and assignment context.'
    reports_title: 'Admin Reports'
    reports: 'Operational reports about occupancy, waitlists, issues and space pressure.'
  features:
    eyebrow: 'Product capabilities'
    title: 'What the system can do right now'
    registration:
      title: 'Registration and account activation'
      body: 'A user creates an account, selects the interface language, receives an activation email and can sign in only after confirmation.'
    dashboard:
      title: 'Day dashboard'
      body: 'The day view shows desk availability, active users, planned vacations, people finder and quick operational actions.'
    booking:
      title: 'Desk booking'
      body: 'The system allows claiming a free desk for the selected day, releasing it manually and protecting availability conflicts.'
    absence:
      title: 'Absence model'
      body: 'Vacations reduce the balance, overlapping ranges are blocked and conflicting desk claims are released.'
    waitlist:
      title: 'Waitlist and recurrence'
      body: 'Occupied desks support a waiting queue, released desks trigger an email claim offer, and recurring office attendance can be saved as recurring reservations.'
    reporting:
      title: 'Issues and reports'
      body: 'Users report desk and room problems, while the administrator sees usage, waitlist and operational bottleneck reports.'
  business:
    eyebrow: 'Business value'
    title: 'What business problems the current version solves'
    capacity:
      title: 'Less wasted office capacity'
      body: 'Releasing a desk after vacation or manual cancellation immediately returns it to circulation and reduces empty reservations.'
    self_service:
      title: 'Employee self-service'
      body: 'Employees register, activate accounts, choose language, claim desks, join the waitlist and report issues without support involvement.'
    operations:
      title: 'Better office operations'
      body: 'Office managers and admins can see current availability, resource pressure and reported issues in one place.'
    waitlist:
      title: 'Handling demand for popular desks'
      body: 'A waitlist with release email offers helps fill popular desks faster and removes manual back-and-forth.'
    visibility:
      title: 'Clear office presence visibility'
      body: 'People finder makes it easy to see who is in the office that day, where they sit and what their desk status is.'
    readiness:
      title: 'Ready for the next product stage'
      body: 'The product already has foundations for meeting rooms, HR integrations, office policies and deeper reporting.'
  stack:
    eyebrow: 'Technology stack'
    title: 'What it runs on'
    backend: 'Application runtime, routing, DI, security, mailer and HTTP layer handling.'
    architecture:
      label: 'Architecture'
      body: 'Split into Domain, Application, Infrastructure and UI with command/query separation.'
    persistence:
      label: 'Persistence'
      body: 'Domain models are Doctrine entities and the database prepares the application for further growth.'
    dev: 'Local runtime, host-based routing and activation email capture during development.'
  flow:
    eyebrow: 'Flow'
    title: 'How the app works'
    step1:
      title: 'Account creation'
      body: 'A new user registers an account, selects language, office days and optionally an assigned desk.'
    step2:
      title: 'Email activation'
      body: 'The system sends a local email with an activation link. Without confirmation the account remains inactive.'
    step3:
      title: 'Day plan and booking'
      body: 'After sign-in, the user sees resource status, claims a desk, releases it, joins a waitlist or creates recurring reservations.'
    step4:
      title: 'Operations and supervision'
      body: 'Use cases protect conflicts, people finder shows who sits where, the waitlist sends offers after release, and the admin gets reports and issue reports.'
  footer: 'This page summarizes the current product state. Detailed domain and architecture rules are described in docs/context.'

pricing:
  meta_title: 'Pricing'
  eyebrow: 'Pricing'
  featured: 'Most popular'
  hero:
    title: 'A plan for small offices and larger organizations.'
    body: 'This pricing page is presentation-oriented. It shows how Smart Desk could be sold: from a simple single-office rollout to a variant with extended administration, reports, waitlists and implementation support.'
    cta_primary: 'Try the app'
    cta_secondary: 'See the product'
  metrics:
    plans:
      title: '3 plans'
      body: 'From a simple start to rollout for bigger teams.'
    flow:
      title: 'Mail + dashboard'
      body: 'Registration, activation, vacations, waitlist and bookings in one flow.'
    people:
      title: 'People finder'
      body: 'Quickly check who is in the office that day and where they sit.'
    admin:
      title: 'Admin insights'
      body: 'Operational reports on occupancy, issues and the most demanded desks.'
  packages:
    eyebrow: 'Packages'
    title: 'Implementation options'
  per_user_month: '/ user / month'
  starter:
    title: 'Starter'
    price: 'PLN 29'
    body: 'For one office and a team that wants to quickly organize desk booking.'
    feature_1: 'Day view and office map'
    feature_2: 'Desk bookings'
    feature_3: 'Registration and account activation'
    feature_4: 'Basic vacation model'
    feature_5: 'People finder'
    cta: 'Start'
  growth:
    title: 'Growth'
    price: 'PLN 59'
    body: 'For an organization that wants administration, policies and more automation.'
    feature_1: 'Everything in Starter'
    feature_2: 'Waitlist for occupied desks'
    feature_3: 'Recurring bookings'
    feature_4: 'Issue reporting for resources'
    feature_5: 'Administrative roles'
    feature_6: 'Usage and operations reports'
    cta: 'Explore product'
  enterprise:
    title: 'Enterprise'
    body: 'For companies that want to connect offices, HR processes and future integrations in one product.'
    price: 'Custom'
    price_note: 'implementation quote'
    feature_1: 'Everything in Growth'
    feature_2: 'Implementation support'
    feature_3: 'Priority roadmap work'
    feature_4: 'Multi-office growth model'
    feature_5: 'Prepared for HR integrations'
    cta: 'Local demo'
  value:
    eyebrow: 'Why this model'
    title: 'What drives product value'
    space:
      title: 'Efficient space usage'
      body: 'Desks and resources are booked only when really needed, and the waitlist helps manage demand.'
    process:
      title: 'Clear employee processes'
      body: 'Registration, activation, day planning, vacations, people finder and issue reporting are all handled through one simple flow.'
    future:
      title: 'Ready for further growth'
      body: 'The architecture allows the system to grow with meeting rooms, HR, more reports and additional bounded contexts.'
  footer: 'This is a presentation page. Pricing is illustrative and can serve as a starting point for a marketing version.'

