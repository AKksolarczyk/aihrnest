about:
  meta_title: 'About Smart Desk'
  eyebrow: 'Smart Desk & Rooms Scheduler'
  hero:
    title: 'Biurka, sale i nieobecnosci w jednej aplikacji.'
    lead: 'Smart Desk porzadkuje planowanie pracy z biura end-to-end. Uzytkownik zaklada konto, aktywuje je mailem, rezerwuje biurko z mapy, dolacza do waitlisty, dostaje oferte po zwolnieniu miejsca, planuje cykliczne obecnosci, zglasza problemy i korzysta z people findera oraz raportow administracyjnych.'
    login: 'Przejdz do logowania'
    register: 'Utworz konto'
    dashboard: 'Otworz dashboard'
  pill:
    booking_title: 'Desk Booking'
    booking: 'Rezerwacja i reczne zwalnianie biurek na konkretny dzien z widokiem mapy biura.'
    waitlist_title: 'Waitlist + Cyklicznosc'
    waitlist: 'Lista oczekujacych z mailem po zwolnieniu miejsca oraz reguly rezerwacji cyklicznych.'
    people_title: 'People Finder'
    people: 'Szybki widok osob obecnych w biurze wraz z lokalizacja, statusem i przypisanym biurkiem.'
    reports_title: 'Admin Reports'
    reports: 'Operacyjne raporty o zajeciach, waitliscie, problemach i obciazeniu przestrzeni.'
  features:
    eyebrow: 'Mozliwosci aplikacji'
    title: 'Co potrafi system na obecnym etapie'
    registration:
      title: 'Rejestracja i aktywacja konta'
      body: 'Uzytkownik zaklada konto, wybiera jezyk interfejsu, dostaje mail aktywacyjny i dopiero po potwierdzeniu moze sie zalogowac.'
    dashboard:
      title: 'Dashboard dnia'
      body: 'Widok dnia pokazuje dostepnosc biurek, aktywnych uzytkownikow, zaplanowane urlopy, people finder i szybkie akcje operacyjne.'
    booking:
      title: 'Rezerwacja biurek'
      body: 'System pozwala zajac wolne biurko na wybrany dzien, recznie je zwolnic i pilnuje konfliktow dostepnosci.'
    absence:
      title: 'Model nieobecnosci'
      body: 'Urlopy odejmuja dni z puli, blokowane sa pokrywajace sie zakresy, a kolidujace zajecia biurek sa zwalniane.'
    waitlist:
      title: 'Waitlista i cyklicznosc'
      body: 'Zajete biurka wspieraja kolejke oczekujacych, po zwolnieniu miejsca system wysyla mail z linkiem do zajecia, a powtarzalne przyjscia mozna zapisac jako rezerwacje cykliczne.'
    reporting:
      title: 'Zgloszenia i raporty'
      body: 'Uzytkownicy raportuja problemy z biurkami i pokojami, a administrator widzi raporty wykorzystania, waitlist i zatorow operacyjnych.'
  business:
    eyebrow: 'Wartosc biznesowa'
    title: 'Jakie problemy biznesowe rozwiazuje obecna wersja'
    capacity:
      title: 'Mniejsze marnowanie miejsc'
      body: 'Zwolnienie biurka po urlopie albo recznej rezygnacji od razu przywraca miejsce do obiegu i zmniejsza puste rezerwacje.'
    self_service:
      title: 'Samodzielnosc pracownikow'
      body: 'Pracownik sam rejestruje konto, aktywuje je, wybiera jezyk, zajmuje biurko, dolacza do waitlisty i zglasza problem bez udzialu supportu.'
    operations:
      title: 'Lepsza obsluga operacyjna biura'
      body: 'Office manager i administrator widza aktualna dostepnosc, obciazenie zasobow i zgromadzone problemy w jednym miejscu.'
    waitlist:
      title: 'Obsluga popytu na popularne miejsca'
      body: 'Waitlista z mailem po zwolnieniu biurka pozwala szybciej obsadzac popularne miejsca i nie trzymac procesu w recznych wiadomosciach.'
    visibility:
      title: 'Przejrzystosc obecnosci w biurze'
      body: 'People finder pozwala szybko sprawdzic kto jest danego dnia w biurze, gdzie siedzi i jaki ma status miejsca.'
    readiness:
      title: 'Gotowosc do dalszego rozwoju'
      body: 'Produkt ma juz fundamenty pod dalsze obszary: sale konferencyjne, HR, polityki biurowe i bardziej zaawansowane raportowanie.'
  stack:
    eyebrow: 'Stack technologiczny'
    title: 'Na czym to stoi'
    backend: 'Runtime aplikacji, routing, DI, security, mailer i obsluga warstwy HTTP.'
    architecture:
      label: 'Architektura'
      body: 'Podzial na Domain, Application, Infrastructure i UI oraz rozdzial command i query.'
    persistence:
      label: 'Persystencja'
      body: 'Modele domenowe sa encjami Doctrine, a baza przygotowuje aplikacje do dalszego rozwoju.'
    dev: 'Lokalny runtime, routing po hostach i przechwytywanie maili aktywacyjnych podczas developmentu.'
  flow:
    eyebrow: 'Przeplyw'
    title: 'Jak dziala aplikacja'
    step1:
      title: 'Utworzenie konta'
      body: 'Nowy uzytkownik rejestruje konto, wybiera jezyk, podaje harmonogram dni biurowych i opcjonalnie przypisane biurko.'
    step2:
      title: 'Aktywacja przez email'
      body: 'System wysyla lokalnie mail z linkiem aktywacyjnym. Bez potwierdzenia konto pozostaje nieaktywne.'
    step3:
      title: 'Plan dnia i rezerwacje'
      body: 'Po zalogowaniu uzytkownik widzi status zasobow, zajmuje biurko, zwalnia je, dolacza do waitlisty albo tworzy rezerwacje cykliczne.'
    step4:
      title: 'Operacje i nadzor'
      body: "Use case'y pilnuja konfliktow, people finder pokazuje kto siedzi gdzie, waitlista wysyla oferty po zwolnieniu miejsca, a admin dostaje raporty i zgloszenia problemow."
  footer: 'Ta strona podsumowuje obecny stan produktu. Szczegolowe zasady domenowe i architektoniczne sa opisane w docs/context.'

